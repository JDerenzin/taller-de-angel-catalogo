<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo MVP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Mi Catálogo</h1>
    </header>

    <main id="app">
        <section id="step-selection">
            <h2>Elige tus opciones:</h2>
            <div id="catalog-container">
                </div>
        </section>

        <section id="step-summary" style="display: none;">
            <h2>Resumen de tu pedido:</h2>
            <div id="summary-text"></div>
            
            <button id="btn-copy-redirect">
                Copiar Resumen y abrir Instagram
            </button>
            
            <button id="btn-back" class="secondary">Volver a empezar</button>
        </section>
    </main>

    <script src="main.js" type="module"></script>
</body>
</html>
